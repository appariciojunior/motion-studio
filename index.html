<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion Studio</title>
    <script>
      const savedTheme = window.localStorage.getItem("motion-studio-theme");
      if (savedTheme === "dark" || (savedTheme !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
    </script>
    <link rel="stylesheet" href="/renderer/web-styles.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/renderer/shims/browser-glazeapi.ts"></script>
    <script type="module" src="/renderer/main/index.tsx"></script>
  </body>
</html>
